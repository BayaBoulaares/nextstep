# serviceaccount-metrics.yaml
# Appliquer une seule fois : oc apply -f serviceaccount-metrics.yaml
# Ensuite Spring Boot lit le token automatiquement depuis le pod

---
# 1. ServiceAccount dédié aux métriques
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextstep-metrics-sa
  namespace: tenant-baya

---
# 2. Secret token permanent lié au ServiceAccount
# Kubernetes/OpenShift renouvelle ce token automatiquement
apiVersion: v1
kind: Secret
metadata:
  name: nextstep-metrics-sa-token
  namespace: tenant-baya
  annotations:
    kubernetes.io/service-account.name: nextstep-metrics-sa
type: kubernetes.io/service-account-token

---
# 3. Accès aux events dans TOUS les namespaces clients (baya-tenant-*)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nextstep-metrics-reader
rules:
  - apiGroups: [""]
    resources: ["events", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# 4. Lier ce ClusterRole au ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nextstep-metrics-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nextstep-metrics-reader
subjects:
  - kind: ServiceAccount
    name: nextstep-metrics-sa
    namespace: tenant-baya

---
# 5. Accès au monitoring OpenShift (Thanos Querier)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nextstep-monitoring-view-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: nextstep-metrics-sa
    namespace: tenant-baya