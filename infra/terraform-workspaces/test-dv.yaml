apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: test-ubuntu-node
  namespace: baya-tenant-baya-boulaares72
  annotations:
    cdi.kubevirt.io/storage.usePopulator: "false"
spec:
  contentType: kubevirt
  source:
    registry:
      url: docker://quay.io/containerdisks/ubuntu:24.04
      pullMethod: node
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
    storageClassName: nfs-csi
