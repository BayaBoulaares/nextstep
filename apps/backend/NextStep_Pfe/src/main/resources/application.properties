

# Server
server.port=8081
server.max-http-request-header-size=48KB
server.tomcat.max-http-header-size=48KB

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nextstep_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.oauth.client-id=nextstep-app

# Keycloak JWT
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mon-app
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://keycloak-tenant-baya.apps.ocp4.nextstep-it.com/realms/mon-app/protocol/openid-connect/certs
# Keycloak JWT
#spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak-tenant-baya.apps.ocp4.nextstep-it.com/realms/mon-app
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://keycloak-tenant-baya.apps.ocp4.nextstep-it.com/realms/mon-app/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak-nextstep-baya.apps.ocp4.nextstep-it.com/realms/mon-app
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://keycloak-nextstep-baya.apps.ocp4.nextstep-it.com/realms/mon-app/protocol/openid-connect/certs
# Keycloak Admin
#keycloak.admin.url=http://localhost:8080
#keycloak.admin.url=https://keycloak-tenant-baya.apps.ocp4.nextstep-it.com
keycloak.admin.url=https://keycloak-nextstep-baya.apps.ocp4.nextstep-it.com
keycloak.admin.realm=mon-app
keycloak.admin.master-realm=master
keycloak.admin.client-id=springboot-client
keycloak.admin.client-secret=${KEYCLOAK_CLIENT_SECRET}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
cors.allowed-origins=http://localhost:3000
app.frontend.url=http://localhost:3000

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.org.springframework.security.oauth2=TRACE

# Google OAuth via Keycloak
keycloak.identity-providers.google.provider-id=google
keycloak.identity-providers.google.enabled=true
keycloak.identity-providers.google.sync-mode=FORCE
keycloak.identity-providers.google.store-token=true
keycloak.identity-providers.google.trust-email=true

# OpenShift
openshift.api-url=https://api.ocp4.nextstep-it.com:6443
openshift.token=${OPENSHIFT_TOKEN}
openshift.ca-base64=${OPENSHIFT_CA_BASE64}
openshift.namespace-prefix=baya-tenant
oc.proxy.port=8001

# Terraform
terraform.binary-path=terraform
terraform.workspaces-dir=C:/Users/bayab/Desktop/nexstep/infra/terraform-workspaces
virtctl.path=C:/Windows/System32/virtctl.exe
