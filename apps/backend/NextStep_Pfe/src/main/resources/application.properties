# ??????????????????????????????????????????????????????????????????????????????
# application.properties ? NextStep PFE
# ? FIX 4 : Keycloak unifié sur un seul realm/port
# ? FIX 5 : Secrets externalisés en variables d'environnement
# ??????????????????????????????????????????????????????????????????????????????

# ?? Serveur ???????????????????????????????????????????????????????????????????
server.port=8081
# Pas de context-path : vos routes sont /auth/**, /audit-logs/**, /api/services/**
# server.servlet.context-path=/api   ? laissé commenté intentionnellement

# ?? Base de données PostgreSQL ????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/nextstep_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Swagger ???????????????????????????????????????????????????????????????????
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.oauth.client-id=nextstep-app

# ??????????????????????????????????????????????????????????????????????????????
# ? FIX 4 ? KEYCLOAK : UN SEUL realm, UN SEUL port
#
# PROBLČME ORIGINAL :
#   jwk-set-uri  ? http://localhost:9090/realms/nextstep   (port 9090, realm "nextstep")
#   issuer-uri   ? http://localhost:8080/realms/mon-app    (port 8080, realm "mon-app")
#   admin.url    ? http://localhost:8080                   (port 8080)
#   admin.realm  ? mon-app
#
#   ? Incohérence totale : le JWT est émis par un realm, validé par un autre
#   ? Résultat : validation JWT échoue ? 401 sur toutes les routes protégées
#
# CORRECTION : tout pointer sur le MĘME Keycloak (port 8080, realm "nextstep")
# Adaptez selon votre configuration réelle.
# ??????????????????????????????????????????????????????????????????????????????

# Validation des JWT reçus (resource server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mon-app
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/mon-app/protocol/openid-connect/certs

# API Admin Keycloak (pour créer/supprimer des utilisateurs)
keycloak.admin.url=http://localhost:8080
keycloak.admin.realm=mon-app
keycloak.admin.master-realm=master
keycloak.admin.client-id=springboot-client
keycloak.admin.client-secret=${KEYCLOAK_CLIENT_SECRET:9q2qw565zuexYfgGYnxtdTl7qstAfdMZ}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:root}

# ??????????????????????????????????????????????????????????????????????????????
# ? FIX 5 ? EMAIL : mot de passe externalisé
#
# PROBLČME ORIGINAL :
#   spring.mail.password=vhvttxvbycntyttj  ? mot de passe Gmail en clair dans le fichier
#   ? Faille de sécurité si le repo est partagé / poussé sur Git
#
# CORRECTION : utiliser une variable d'environnement
#   Linux/Mac : export MAIL_PASSWORD=vhvttxvbycntyttj
#   Windows   : set MAIL_PASSWORD=vhvttxvbycntyttj
#   IntelliJ  : Run > Edit Configurations > Environment variables
# ??????????????????????????????????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#spring.mail.username=${MAIL_USERNAME:bayaboubou20@gmail.com}
spring.mail.username=bayaboubou20@gmail.com
spring.mail.password=vhvttxvbycntyttj
#MAIL_PASSWORD=vhvttxvbycntyttj
#spring.mail.password=${MAIL_PASSWORD:vhvttxvbycntyttj}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? CORS ??????????????????????????????????????????????????????????????????????
cors.allowed-origins=http://localhost:3000

# ?? Frontend ??????????????????????????????????????????????????????????????????
app.frontend.url=http://localhost:3000

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
# Décommenter pour débuguer l'intercepteur d'audit :
# logging.level.com.nextstep=DEBUG
# logging.level.com.nextstep.interceptor=DEBUG

# Provider Google
keycloak.identity-providers.google.provider-id=google
keycloak.identity-providers.google.enabled=true
keycloak.identity-providers.google.sync-mode=FORCE
keycloak.identity-providers.google.store-token=true
keycloak.identity-providers.google.trust-email=true
server.max-http-request-header-size=48KB
server.tomcat.max-http-header-size=48KB