name: Security Pipeline — NextStep PFE

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  secrets-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca-backend:
    name: Trivy SCA Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./apps/backend/NextStep_Pfe
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 0

  sca-frontend:
    name: Trivy SCA Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./apps/frontend/frontend
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 0

  sast-backend:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('apps/backend/NextStep_Pfe/pom.xml') }}
      - name: SonarCloud Scan
        run: |
          mvn -f apps/backend/NextStep_Pfe/pom.xml verify sonar:sonar \
            -Dsonar.projectKey=BayaBoulaares_nextstep \
            -Dsonar.organization=bayaboulaares \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN \
            -DskipTests
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}